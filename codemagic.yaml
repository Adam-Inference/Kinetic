workflows:
  build_android_apk:
    name: Build Kinetic Android APK
    max_build_duration: 60
    environment:
      flutter: none
      xcode: none
      android:
        gradle: default
        build_tools: 33.0.2
        ndk: 23.1.7779620
    cache:
      paths:
        - ~/.gradle
    scripts:
      - name: Clean project
        script: |
          echo "Cleaning Gradle project"
          ./gradlew clean
      - name: Assemble release APK
        script: |
          echo "Building release APK for Kinetic"
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        on_build_success: true
